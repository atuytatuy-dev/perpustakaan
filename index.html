<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Perpustakaan Digital</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
}

.container {
    padding: 20px;
}

.control-box {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
}

.control-box input, .control-box select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    flex: 1;
}

.book-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.book-card {
    background: white;
    color: black;
    border-radius: 15px;
    overflow: hidden;
    text-align: center;
    transition: 0.3s;
}

.book-card:hover {
    transform: scale(1.05);
}

.book-card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.book-info {
    padding: 10px;
}

button {
    background: #3498db;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<header>
📚 Sistem Informasi Perpustakaan Digital
</header>

<div class="container">

<div class="control-box">
<input type="text" id="searchInput" placeholder="Cari buku..." onkeyup="filterBooks()">

<select id="categoryFilter" onchange="filterBooks()">
<option value="all">Semua Genre</option>
<option value="romantis">Romantis</option>
<option value="fantasi">Fantasi</option>
<option value="inspiratif">Inspiratif</option>
</select>
</div>

<div class="book-container" id="bookContainer">

<div class="book-card" data-category="inspiratif">
<img src="https://covers.openlibrary.org/b/id/8231996-L.jpg">
<div class="book-info">
<h4>Laskar Pelangi</h4>
<p>Andrea Hirata</p>
<span>inspiratif • 2005</span>
<br>
<button onclick="alert('Buku dipilih!')">Pilih</button>
</div>
</div>

<div class="book-card" data-category="fantasi">
<img src="https://covers.openlibrary.org/b/id/8231852-L.jpg">
<div class="book-info">
<h4>Bumi</h4>
<p>Tere Liye</p>
<span>fantasi • 2014</span>
<br>
<button onclick="alert('Buku dipilih!')">Pilih</button>
</div>
</div>

<div class="book-card" data-category="romantis">
<img src="https://covers.openlibrary.org/b/id/8235117-L.jpg">
<div class="book-info">
<h4>Dilan 1990</h4>
<p>Pidi Baiq</p>
<span>romantis • 2014</span>
<br>
<button onclick="alert('Buku dipilih!')">Pilih</button>
</div>
</div>

</div>
</div>

<script>
function filterBooks() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let category = document.getElementById("categoryFilter").value;
    let books = document.getElementsByClassName("book-card");

    for (let i = 0; i < books.length; i++) {
        let text = books[i].innerText.toLowerCase();
        let cat = books[i].getAttribute("data-category");

        let cocok = text.includes(input);
        let cocokKategori = (category === "all" || category === cat);

        books[i].style.display = (cocok && cocokKategori) ? "block" : "none";
    }
}
</script>

</body>
</html>
